syntax = "proto3";

package autocomplete;

option java_package = "com.singularis.eateria.services";
option java_outer_classname = "GetFriends";

message GetFriendsRequest {
  // Empty request - user is identified by JWT token
}

message Friend {
  string email = 1;
  string nickname = 2;
}

message GetFriendsResponse {
  repeated Friend friends = 1;
  int32 count = 2;
}
